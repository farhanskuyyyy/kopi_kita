        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ProductDetail' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Referenced categoryId no longer exists (stale-category race, Screen 20 Exceptions)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/products/{productId}:
    get:
      tags: [admin-catalog]
      summary: Fetch existing product for edit (Screen 21)
      operationId: adminGetProduct
      security: [{ staffSessionCookie: [] }]
