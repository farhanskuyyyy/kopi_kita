        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ProductDetail' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [admin-catalog]
      summary: Update product (F-033; Screen 21)
      operationId: adminUpdateProduct
      security: [{ staffSessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductUpdateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ProductDetail' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Product was concurrently soft-deleted by another session (Screen 21 Exceptions, A12)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                default:
                  value:
                    success: false
                    data: null
                    error: { code: "PRODUCT_DELETED", message: "This product was deleted.", details: null, fieldErrors: null }
                    meta: { requestId: "req_7", timestamp: "2026-07-22T03:00:00Z", durationMs: 5 }
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [admin-catalog]
      summary: Soft-delete product (D2, F-034; Screens 19, 21)
      operationId: adminDeleteProduct
      security: [{ staffSessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '200':
          description: Soft-deleted — remains referenceable from historical orders (D2)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ProductDetail' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

