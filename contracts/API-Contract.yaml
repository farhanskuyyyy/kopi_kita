      operationId: adminListOrders
      security: [{ staffSessionCookie: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [all, received, preparing, ready, completed], default: all }
        - name: sort
          in: query
          schema: { type: string, enum: [newest, oldest], default: newest }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/OrderSummary' }
                          pagination: { $ref: '#/components/schemas/PaginationMeta' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/orders/{orderId}:
    get:
      tags: [admin-fulfillment]
      summary: Order detail — line items, customer info, status control (F-042; Screen 26)
      operationId: adminGetOrder
      security: [{ staffSessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/OrderIdParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Order' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/orders/{orderId}/status:
    patch:
      tags: [admin-fulfillment]
      summary: >
        Advance (one step) or Override (jump to any status) — Override permanently stops
        that order's auto-timer (F-043, D3, A2, A3, §3.11; Screen 26)
      operationId: adminUpdateOrderStatus
      security: [{ staffSessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/OrderIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderStatusUpdateRequest' }
            examples:
              advance:
                value: { action: "advance" }
              override:
                value: { action: "override", targetStatus: "ready" }
      responses:
        '200':
          description: >
            Status updated; on the frontend a failed mocked update reverts status to the
            last known-good value rather than leaving it ambiguous (Screen 26 Error state).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Order' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid transition (e.g. Advance attempted at completed, or malformed override target)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '500':
          $ref: '#/components/responses/ServerError'

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:

  securitySchemes:
    customerSessionCookie:
      type: apiKey
      in: cookie
      name: csess
      description: Customer identity domain session (spec §3.1) — independent from staff session
    staffSessionCookie:
      type: apiKey
      in: cookie
      name: ssess
      description: Staff identity domain session (spec §3.1) — role carried in StaffUser.role

  parameters:
    PageParam:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    LimitParam:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    ProductIdParam:
      name: productId
      in: path
      required: true
      schema: { type: string }
    CategoryIdParam:
      name: categoryId
      in: path
      required: true
      schema: { type: string }
    CategorySlugParam:
      name: categorySlug
      in: path
      required: true
      schema: { type: string }
    OrderIdParam:
      name: orderId
      in: path
      required: true
      schema: { type: string }

  responses:
    ValidationError:
      description: One or more fields failed validation (422)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            default:
              value:
                success: false
                data: null
                error:
                  code: "VALIDATION_ERROR"
                  message: "One or more fields are invalid."
                  details: null
                  fieldErrors:
                    - { field: "email", message: "Enter a valid email address." }
                meta: { requestId: "req_8", timestamp: "2026-07-22T03:00:00Z", durationMs: 4 }
    InvalidCredentials:
      description: Auth failure — invalid email/password or username/password (401)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            default:
              value:
                success: false
                data: null
                error: { code: "INVALID_CREDENTIALS", message: "Incorrect email or password.", details: null, fieldErrors: null }
                meta: { requestId: "req_9", timestamp: "2026-07-22T03:00:00Z", durationMs: 3 }
    Unauthorized:
      description: No/expired session (401)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            default:
              value:
                success: false
                data: null
                error: { code: "SESSION_EXPIRED", message: "Session expired, please log in again.", details: null, fieldErrors: null }
                meta: { requestId: "req_10", timestamp: "2026-07-22T03:00:00Z", durationMs: 3 }
    Forbidden:
      description: Authenticated but wrong staff role (403)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            default:
              value:
                success: false
                data: null
                error: { code: "FORBIDDEN_ROLE", message: "You do not have access to this section.", details: null, fieldErrors: null }
                meta: { requestId: "req_11", timestamp: "2026-07-22T03:00:00Z", durationMs: 3 }
    NotFound:
      description: Entity does not exist — triggers the 404 screen client-side (F-047)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            default:
              value:
                success: false
                data: null
                error: { code: "NOT_FOUND", message: "The requested resource was not found.", details: null, fieldErrors: null }
                meta: { requestId: "req_12", timestamp: "2026-07-22T03:00:00Z", durationMs: 3 }
    CategoryHasProductsConflict:
      description: Category delete blocked — products still assigned (D1, A1, F-039)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            default:
              value:
                success: false
                data: null
                error:
                  code: "CATEGORY_HAS_PRODUCTS"
                  message: "This category has 4 assigned products and cannot be deleted."
                  details: { assignedProductCount: 4, categoryId: "cat_2" }
                  fieldErrors: null
                meta: { requestId: "req_13", timestamp: "2026-07-22T03:00:00Z", durationMs: 5 }
    CategoryNameConflict:
      description: Category name already exists (case-insensitive) (F-037, F-038)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            default:
              value:
                success: false
                data: null
                error:
                  code: "CATEGORY_NAME_EXISTS"
                  message: "A category named 'Coffee' already exists."
                  details: null
                  fieldErrors: [{ field: "name", message: "A category named 'Coffee' already exists." }]
                meta: { requestId: "req_14", timestamp: "2026-07-22T03:00:00Z", durationMs: 4 }
    EmailExistsConflict:
      description: Account email already registered, case-insensitive (F-018)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            default:
              value:
                success: false
                data: null
                error:
                  code: "EMAIL_EXISTS"
                  message: "An account with this email already exists."
                  details: null
                  fieldErrors: [{ field: "email", message: "An account with this email already exists." }]
                meta: { requestId: "req_15", timestamp: "2026-07-22T03:00:00Z", durationMs: 4 }
    ServerError:
      description: Unexpected mocked server failure (500)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            default:
              value:
                success: false
                data: null
                error: { code: "SERVER_ERROR", message: "Something went wrong. Please try again.", details: null, fieldErrors: null }
                meta: { requestId: "req_16", timestamp: "2026-07-22T03:00:00Z", durationMs: 2 }

  schemas:

    # ---- Envelope -------------------------------------------------------
    Meta:
      type: object
      required: [requestId, timestamp, durationMs]
      properties:
        requestId: { type: string }
        timestamp: { type: string, format: date-time }
        durationMs: { type: integer, minimum: 0 }

    SuccessBase:
      type: object
      required: [success, error, meta]
      properties:
        success: { type: boolean, const: true }
        error: { type: "null" }
        meta: { $ref: '#/components/schemas/Meta' }

    FieldError:
      type: object
      required: [field, message]
      properties:
        field: { type: string }
        message: { type: string }

    ErrorObject:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: >
            Stable machine-readable error code. See API-Contract error-code table in
            Stage 4 delivery notes for the full enumerated list.
        message: { type: string }
        details:
          description: Optional structured context (e.g. assignedProductCount, unavailableLines)
          nullable: true
        fieldErrors:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/FieldError' }

    ErrorEnvelope:
      type: object
      required: [success, data, error, meta]
      properties:
        success: { type: boolean, const: false }
        data: { type: "null" }
        error: { $ref: '#/components/schemas/ErrorObject' }
        meta: { $ref: '#/components/schemas/Meta' }

    PaginationMeta:
      type: object
      required: [page, limit, totalItems, totalPages]
      properties:
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1 }
        totalItems: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }

    CountData:
      type: object
      required: [count]
      properties:
        count: { type: integer, minimum: 0 }

    # ---- Catalog ----------------------------------------------------------
    Category:
      type: object
      required: [id, name, slug]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        productCount: { type: integer, minimum: 0, description: "Included on admin list/edit and where shown (F-036, F-039)" }

    CategoryCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }

    CategoryUpdateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }

    CustomizationOption:
      type: object
      required: [id, label, priceDelta]
      properties:
        id: { type: string }
        label: { type: string }
        priceDelta:
          type: integer
          minimum: 0
          description: Additive delta in IDR on top of base price (D4)

    CustomizationGroup:
      type: object
      required: [id, name, type, required, options]
      properties:
        id: { type: string }
        name: { type: string, example: "Size" }
        type: { type: string, enum: [single, multi] }
        required: { type: boolean }
        options:
          type: array
          items: { $ref: '#/components/schemas/CustomizationOption' }

    Product:
      type: object
      required: [id, name, categoryId, categoryName, basePrice, available, isDeleted]
      properties:
        id: { type: string }
        name: { type: string }
        categoryId: { type: string }
        categoryName: { type: string }
        basePrice: { type: integer, minimum: 0, description: IDR integer, no decimals }
        image: { type: string, nullable: true, description: "Mocked upload data URL or seed asset path" }
        tags:
          type: array
          items: { type: string }
        available: { type: boolean }
        isDeleted: { type: boolean, description: "Soft-delete flag (D2, §3.13)" }

    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          required: [description, images]
          properties:
            description: { type: string }
            images:
              type: array
              items: { type: string }
            customizationGroups:
              type: array
              items: { $ref: '#/components/schemas/CustomizationGroup' }
            lastUpdatedAt: { type: string, format: date-time, nullable: true }

    ProductCreateRequest:
      type: object
      required: [name, categoryId, price, description]
      properties:
        name: { type: string, minLength: 1 }
        categoryId: { type: string }
        price: { type: integer, exclusiveMinimum: 0 }
        description: { type: string, minLength: 1 }
        image: { type: string, nullable: true, description: "Mocked upload — accepted as a data URL, soft 5MB limit enforced client-side" }
        available: { type: boolean, default: true }
        customizationGroups:
          type: array
          items: { $ref: '#/components/schemas/CustomizationGroup' }

    ProductUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/ProductCreateRequest'

    # ---- Cart ---------------------------------------------------------
    CartLineInput:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: string }
        quantity: { type: integer, minimum: 1 }
        selectedOptionIds:
          type: array
          items: { type: string }
          description: Flattened list of chosen CustomizationOption ids across all groups

    CartLineValidated:
      type: object
      required: [productId, name, unitPrice, quantity, lineTotal, available]
      properties:
        productId: { type: string }
        name: { type: string }
        customizationSummary: { type: string, nullable: true, example: "Large, Oat Milk, +Extra Shot" }
        unitPrice: { type: integer, minimum: 0, description: "base + Σ(selected option deltas), frozen at add-to-cart time (D4, §3.12)" }
        quantity: { type: integer, minimum: 1 }
        lineTotal: { type: integer, minimum: 0 }
        available: { type: boolean }
        unavailableReason: { type: string, nullable: true }

    PromoValidateRequest:
      type: object
      required: [code, subtotal]
      properties:
        code: { type: string, minLength: 1 }
        subtotal: { type: integer, minimum: 0 }

    PromoValidateResult:
      type: object
      required: [valid, code, discountAmount]
      properties:
        valid: { type: boolean }
        code: { type: string }
        type: { type: string, enum: [percent, fixed], nullable: true }
        value: { type: integer, nullable: true, description: "Percent (0-100) or fixed IDR amount depending on type" }
        discountAmount: { type: integer, minimum: 0, description: "Resolved IDR discount; 0 when invalid" }
        message: { type: string, nullable: true }

    # ---- Checkout / Orders ---------------------------------------------
    FulfillmentMethod:
      type: string
      enum: [pickup, dine-in, delivery]

    PaymentMethod:
      type: string
      description: Mocked demo payment options; "demo_declined_card" is the deliberately-triggerable failure path (F-013)
      enum: [demo_credit_card, demo_cash_on_pickup, demo_e_wallet, demo_declined_card]

    Address:
      type: object
      required: [line1, city, postalCode]
      properties:
        line1: { type: string, minLength: 1 }
        line2: { type: string, nullable: true }
        city: { type: string, minLength: 1 }
        postalCode: { type: string, pattern: "^[0-9]{4,10}$" }

    CheckoutDetails:
      type: object
      required: [fullName, email, phone, fulfillmentMethod]
      properties:
        fullName: { type: string, minLength: 1 }
        email: { type: string, format: email }
        phone: { type: string, pattern: "^\\+?[0-9]{8,15}$" }
        fulfillmentMethod: { $ref: '#/components/schemas/FulfillmentMethod' }
        address:
          allOf: [{ $ref: '#/components/schemas/Address' }]
          nullable: true
          description: Required when fulfillmentMethod = delivery (A6)

    OrderCreateRequest:
      type: object
      required: [details, paymentMethod, lines]
      properties:
        details: { $ref: '#/components/schemas/CheckoutDetails' }
        paymentMethod: { $ref: '#/components/schemas/PaymentMethod' }
        promoCode: { type: string, nullable: true }
        lines:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/CartLineInput' }

    OrderLine:
      type: object
      required: [productId, name, unitPrice, quantity, lineTotal]
      properties:
        productId: { type: string }
        name: { type: string }
        customizationSummary: { type: string, nullable: true }
        unitPrice: { type: integer, minimum: 0 }
        quantity: { type: integer, minimum: 1 }
        lineTotal: { type: integer, minimum: 0 }

    OrderStatus:
      type: string
      description: "Strictly forward by default (§3.11): received -> preparing -> ready -> completed"
      enum: [received, preparing, ready, completed]

    OrderCustomer:
      type: object
      required: [name, isGuest]
      properties:
        name: { type: string }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        isGuest: { type: boolean }
        accountId: { type: string, nullable: true }

    Order:
      type: object
      required: [id, status, createdAt, fulfillmentMethod, paymentMethod, lines, subtotal, tax, discount, total, customer]
      properties:
        id: { type: string }
        status: { $ref: '#/components/schemas/OrderStatus' }
        createdAt: { type: string, format: date-time }
        estimatedReadyAt: { type: string, format: date-time, nullable: true }
        lastStatusChangeAt: { type: string, format: date-time, nullable: true, description: "A8 — lightweight timestamp only, no full audit log" }
        autoProgressionStopped: { type: boolean, description: "True once staff Override/Advance has touched this order (A2)" }
        fulfillmentMethod: { $ref: '#/components/schemas/FulfillmentMethod' }
        address:
          allOf: [{ $ref: '#/components/schemas/Address' }]
          nullable: true
        paymentMethod: { $ref: '#/components/schemas/PaymentMethod' }
        lines:
          type: array
          items: { $ref: '#/components/schemas/OrderLine' }
        subtotal: { type: integer, minimum: 0 }
        tax: { type: integer, minimum: 0, description: "Mocked flat percentage, always labeled explicitly (§3.5)" }
        discount: { type: integer, minimum: 0 }
        total: { type: integer, minimum: 0 }
        customer: { $ref: '#/components/schemas/OrderCustomer' }

    OrderSummary:
      type: object
      required: [id, placedAt, status, total, itemCount, fulfillmentMethod]
      properties:
        id: { type: string }
        placedAt: { type: string, format: date-time }
        status: { $ref: '#/components/schemas/OrderStatus' }
        total: { type: integer, minimum: 0 }
        itemCount: { type: integer, minimum: 0 }
        fulfillmentMethod: { $ref: '#/components/schemas/FulfillmentMethod' }
        customerName: { type: string, description: "Present on admin list (F-041); omitted on customer's own history" }

    OrderStatusUpdateRequest:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [advance, override] }
        targetStatus:
          allOf: [{ $ref: '#/components/schemas/OrderStatus' }]
          nullable: true
          description: Required when action = override

    UnavailableItem:
      type: object
      required: [productId, name]
      properties:
        productId: { type: string }
        name: { type: string }

    ReorderResult:
      type: object
      required: [addedLines, unavailableItems]
      properties:
        addedLines:
          type: array
          items: { $ref: '#/components/schemas/CartLineValidated' }
        unavailableItems:
          type: array
          items: { $ref: '#/components/schemas/UnavailableItem' }

    # ---- Auth / Account -------------------------------------------------
    User:
      type: object
      required: [id, name, email, memberSince]
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        memberSince: { type: string, format: date-time }

    StaffRole:
      type: string
      enum: [catalog-admin, fulfillment-staff]

    StaffUser:
      type: object
      required: [id, name, role]
      properties:
        id: { type: string }
        name: { type: string }
        role: { $ref: '#/components/schemas/StaffRole' }

    CustomerRegisterRequest:
      type: object
      required: [name, email, password, confirmPassword]
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        confirmPassword: { type: string, minLength: 8 }

    CustomerLoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }
        rememberMe: { type: boolean, default: false }

    StaffLoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, minLength: 1 }
        password: { type: string, minLength: 1 }

    ProfileUpdateRequest:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        phone: { type: string, pattern: "^\\+?[0-9]{8,15}$" }

    # ---- Store Info -----------------------------------------------------
    StoreHours:
      type: object
      required: [day, openTime, closeTime]
      properties:
        day: { type: string, enum: [Mon, Tue, Wed, Thu, Fri, Sat, Sun] }
        openTime: { type: string, example: "08:00" }
        closeTime: { type: string, example: "21:00" }

    StoreInfo:
      type: object
      required: [hours, address, phone]
      properties:
        hours:
          type: array
          items: { $ref: '#/components/schemas/StoreHours' }
        address: { type: string }
        phone: { type: string }
        mapPlaceholderUrl: { type: string, nullable: true }
