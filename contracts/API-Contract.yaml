# metadata:
#   artifact: API Contract
#   version: 1.0
#   owner: software-architect
#   status: draft
#
# Project: ecatalog-coffeeshop
# Workflow: clickable-frontend — Stage 4: API Contract Design
# Prepared by: Software Architect Agent (sw-architect-ecatalog-coffe-clickable-fe)
# Upstream inputs: Frontend-Specification.md (28 screens), Frontend-Architecture.md v1.1
#   (adapter chain: Page -> React Query hook -> features/*/api adapter (Zod parse) ->
#   lib/api/httpClient -> MSW handler -> mocks/data/db.ts), Feature-List.md (47 features).
#
# This is the single source of truth the frontend Zod adapters type against and the
# Stage 5 Mock Backend Engineer implements 1:1 in MSW. Contract only — no business logic,
# no implementation. Money is always an integer IDR minor-unit-free amount (no floats,
# no decimals — Rupiah has no subunit in practice here), per Frontend-Architecture §7
# (lib/format/currency.ts formatIDR).

openapi: 3.1.0

info:
  title: Coffeeshop E-Catalog API
  version: "1.0.0"
  description: >
    Backend API contract for the ecatalog-coffeeshop clickable-frontend demo.
    Implemented by Stage 5 (Mock Backend Engineer) as MSW handlers over an in-memory
    store (mocks/data/db.ts). Every endpoint returns the standard response envelope
    (STACK-STANDARDS.md: success flag, data, error, request timing). All monetary
    amounts are non-negative integers denominated in IDR (e.g. 45000 = Rp 45.000).
  contact:
    name: software-architect-ecatalog-coffe-clickable-fe

servers:
  - url: /api/v1
    description: Mocked backend (MSW), same-origin relative base path used by lib/api/httpClient

tags:
  - name: auth
    description: Customer and staff authentication (two independent session domains, spec §3.1)
  - name: catalog
    description: Public product and category browsing/search
  - name: cart
    description: Server-side cart support — stock re-check, promo validation
  - name: checkout
    description: Payment method validation and order placement
  - name: orders
    description: Order retrieval / tracking (public, bookmarkable)
  - name: account
    description: Registered-customer profile, order history, favorites
  - name: store-info
    description: Static/mocked store info
  - name: admin-dashboard
    description: Staff dashboard counts (Catalog Admin + Fulfillment Staff)
  - name: admin-catalog
    description: Catalog Admin product & category CRUD
  - name: admin-fulfillment
    description: Fulfillment Staff order queue & status control

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
security: []

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ===== AUTH ================================================================
  /auth/customer/register:
    post:
      tags: [auth]
      summary: Register a new customer account (F-018, Screen 12)
      operationId: registerCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerRegisterRequest' }
            examples:
              default:
                value: { name: "Sari Amelia", email: "sari@example.com", password: "Passw0rd!", confirmPassword: "Passw0rd!" }
      responses:
        '201':
          description: Account created and auto-logged-in
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [user, sessionToken]
                        properties:
                          user: { $ref: '#/components/schemas/User' }
                          sessionToken: { type: string }
        '409':
          $ref: '#/components/responses/EmailExistsConflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/customer/login:
    post:
      tags: [auth]
      summary: Registered-customer login (F-019, Screen 11)
      operationId: loginCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerLoginRequest' }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [user, sessionToken]
                        properties:
                          user: { $ref: '#/components/schemas/User' }
                          sessionToken: { type: string }
        '401':
          $ref: '#/components/responses/InvalidCredentials'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/staff/login:
    post:
      tags: [auth]
      summary: Shared staff login — Catalog Admin & Fulfillment Staff (F-029, D7, Screen 17)
      operationId: loginStaff
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StaffLoginRequest' }
      responses:
        '200':
          description: Authenticated; role in response drives client-side redirect/gating (D7)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [staffUser, sessionToken]
                        properties:
                          staffUser: { $ref: '#/components/schemas/StaffUser' }
                          sessionToken: { type: string }
        '401':
          $ref: '#/components/responses/InvalidCredentials'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/me:
    get:
      tags: [auth]
      summary: Resolve the current session for a given identity domain (spec §3.1, §3.2)
      operationId: getCurrentSession
      security:
        - customerSessionCookie: []
        - staffSessionCookie: []
      parameters:
        - name: domain
          in: query
          required: true
          schema: { type: string, enum: [customer, staff] }
          description: Which of the two independent session domains to resolve
      responses:
        '200':
          description: Session is valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [domain]
                        properties:
                          domain: { type: string, enum: [customer, staff] }
                          user: { $ref: '#/components/schemas/User' }
                          staffUser: { $ref: '#/components/schemas/StaffUser' }
        '401':
          description: No session / session expired for the requested domain
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                expired:
                  value:
                    success: false
                    data: null
                    error: { code: "SESSION_EXPIRED", message: "Session expired, please log in again." }
                    meta: { requestId: "req_1", timestamp: "2026-07-22T03:00:00Z", durationMs: 4 }
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/logout:
    post:
      tags: [auth]
      summary: End the current session for a given identity domain (Screen 13, F-045)
      operationId: logout
      security:
        - customerSessionCookie: []
        - staffSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain]
              properties:
                domain: { type: string, enum: [customer, staff] }
      responses:
        '200':
          description: Session cleared
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          loggedOut: { type: boolean, const: true }
        '500':
          $ref: '#/components/responses/ServerError'

  # ===== CATALOG (public) =====================================================
  /categories:
    get:
      tags: [catalog]
      summary: List categories (Home shortcuts, Menu nav, Checkout — none; Screen 1, 2)
      operationId: listCategories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/Category' }
              examples:
                default:
                  value:
                    success: true
                    data:
                      items:
                        - { id: "cat_1", name: "Coffee", slug: "coffee", productCount: 12 }
                        - { id: "cat_2", name: "Non-Coffee", slug: "non-coffee", productCount: 6 }
                    error: null
                    meta: { requestId: "req_2", timestamp: "2026-07-22T03:00:00Z", durationMs: 8 }
        '500':
          $ref: '#/components/responses/ServerError'

  /categories/{categorySlug}:
    get:
      tags: [catalog]
      summary: Resolve a category by slug — used to validate /menu/:categorySlug (F-047, Screen 2)
      operationId: getCategoryBySlug
      parameters:
        - $ref: '#/components/parameters/CategorySlugParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Category' }
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /products:
    get:
      tags: [catalog]
      summary: List/search products — Home, Catalog/Menu, Search Results (F-001, F-003, F-004, F-005; Screens 1, 2, 3)
      operationId: listProducts
      parameters:
        - name: category
          in: query
          schema: { type: string }
          description: Category slug filter (Menu)
        - name: q
          in: query
          schema: { type: string }
          description: Keyword search across name/description (Search Results, F-003)
        - name: price_min
          in: query
          schema: { type: integer, minimum: 0 }
        - name: price_max
          in: query
          schema: { type: integer, minimum: 0 }
        - name: tags
          in: query
          style: form
          explode: true
          schema: { type: array, items: { type: string } }
          description: e.g. tags=featured for Home's featured section
        - name: availability
          in: query
          schema: { type: string, enum: [in_stock_only, all], default: all }
        - name: sort
          in: query
          schema: { type: string, enum: [price_asc, price_desc, popularity], default: popularity }
          description: Invalid value falls back to popularity per spec Screen 2
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: >
            OK. If price_min > price_max the API resets both filters server-side and echoes
            `meta.filterNotice` so the frontend can surface the inline note (spec Screen 2).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/Product' }
                          pagination: { $ref: '#/components/schemas/PaginationMeta' }
        '500':
          $ref: '#/components/responses/ServerError'

  /products/{productId}:
    get:
      tags: [catalog]
      summary: Product detail — customization groups, availability, live price basis (F-002, F-006, F-027; Screen 4)
      operationId: getProduct
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ProductDetail' }
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ===== CART (server-side support) ==========================================
  /cart/validate:
    post:
      tags: [cart]
      summary: Stock re-check + price recompute for current cart lines (Cart hydrate, Review re-check; F-025, Screens 5, 8)
      operationId: validateCart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lines]
              properties:
                lines:
                  type: array
                  items: { $ref: '#/components/schemas/CartLineInput' }
      responses:
        '200':
          description: >
            Always 200 even when some lines are unavailable — unavailability is data,
            not a request error; the frontend flags lines and blocks checkout per F-025.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [lines, allAvailable, subtotal]
                        properties:
                          lines:
                            type: array
                            items: { $ref: '#/components/schemas/CartLineValidated' }
                          allAvailable: { type: boolean }
                          subtotal: { type: integer, minimum: 0 }
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /promo/validate:
    post:
      tags: [cart]
      summary: Validate/apply a promo code against a mocked valid-code list (D8, F-026; Screen 5)
      operationId: validatePromo
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromoValidateRequest' }
      responses:
        '200':
          description: >
            Always 200 — an invalid/expired code is a valid business result (valid:false),
            not a request error, per F-026 ("does not block checkout").
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PromoValidateResult' }
              examples:
                valid:
                  value:
                    success: true
                    data: { valid: true, code: "COFFEE10", type: "percent", value: 10, discountAmount: 4500, message: null }
                    error: null
                    meta: { requestId: "req_3", timestamp: "2026-07-22T03:00:00Z", durationMs: 5 }
                invalid:
                  value:
                    success: true
                    data: { valid: false, code: "BADCODE", type: null, value: null, discountAmount: 0, message: "This promo code is not valid or has expired." }
                    error: null
                    meta: { requestId: "req_4", timestamp: "2026-07-22T03:00:00Z", durationMs: 5 }
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  # ===== CHECKOUT / ORDERS (public/customer) =================================
  /checkout/payment/validate:
    post:
      tags: [checkout]
      summary: >
        Validate the selected mocked payment method (F-013, Screen 7). Selecting the
        deliberately-triggerable failure option (paymentMethod = "demo_declined_card")
        returns 402 so Continue does not advance to Review.
      operationId: validatePaymentMethod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentMethod]
              properties:
                paymentMethod: { $ref: '#/components/schemas/PaymentMethod' }
      responses:
        '200':
          description: Payment method accepted (demo — no real charge occurs)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          valid: { type: boolean, const: true }
        '402':
          description: Mocked payment failure (deliberately-triggerable demo path)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                default:
                  value:
                    success: false
                    data: null
                    error: { code: "PAYMENT_FAILED", message: "Demo payment declined — no real charge occurred. Please try another method.", details: null, fieldErrors: null }
                    meta: { requestId: "req_5", timestamp: "2026-07-22T03:00:00Z", durationMs: 6 }
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /orders:
    post:
      tags: [checkout]
      summary: Place order — guest or registered (F-011–F-015, Screen 8)
      operationId: createOrder
      security:
        - customerSessionCookie: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderCreateRequest' }
      responses:
        '201':
          description: Order placed; cart is cleared client-side on success (F-015)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Order' }
        '409':
          description: One or more lines became unavailable during final stock re-check (F-025)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                default:
                  value:
                    success: false
                    data: null
                    error:
                      code: "STOCK_UNAVAILABLE"
                      message: "Some items in your cart are no longer available."
                      details: { unavailableLines: [{ productId: "prod_9", name: "Seasonal Latte" }] }
                      fieldErrors: null
                    meta: { requestId: "req_6", timestamp: "2026-07-22T03:00:00Z", durationMs: 12 }
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /orders/{orderId}:
    get:
      tags: [orders]
      summary: Get order by ID — Order Confirmation & Order Tracking (F-016, F-017; Screens 9, 10)
      operationId: getOrder
      parameters:
        - $ref: '#/components/parameters/OrderIdParam'
      responses:
        '200':
          description: >
            OK. Order Tracking polls this endpoint (refetchInterval, Frontend-Architecture §2.2)
            to reflect timer/staff-driven status changes near-immediately (§3.11).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Order' }
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ===== ACCOUNT (registered customer) ========================================
  /account/profile:
    get:
      tags: [account]
      summary: Registered-customer profile (Account Home, Checkout Details pre-fill; Screens 6, 13)
      operationId: getProfile
      security: [{ customerSessionCookie: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/User' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [account]
      summary: Update profile (inline edit — name/phone; Screen 13)
      operationId: updateProfile
      security: [{ customerSessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileUpdateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/User' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /account/orders:
    get:
      tags: [account]
      summary: Order history (F-020; Screen 14)
      operationId: listMyOrders
      security: [{ customerSessionCookie: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [all, active, completed], default: all }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/OrderSummary' }
                          pagination: { $ref: '#/components/schemas/PaginationMeta' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /account/orders/{orderId}/reorder:
    post:
      tags: [account]
      summary: Reorder — adds available items to current cart, flags unavailable ones (F-021, A4; Screen 14)
      operationId: reorder
      security: [{ customerSessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/OrderIdParam'
      responses:
        '200':
          description: >
            Always 200 — even if every item is now unavailable, the notice still explains why
            (A4), never a silent no-op.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ReorderResult' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /account/favorites:
    get:
      tags: [account]
      summary: List favorites (F-022; Screen 15)
      operationId: listFavorites
      security: [{ customerSessionCookie: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/Product' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [account]
      summary: Add a favorite (F-022; Screens 4, 15)
      operationId: addFavorite
      security: [{ customerSessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId]
              properties:
                productId: { type: string }
      responses:
        '201':
          description: Added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Product' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /account/favorites/{productId}:
    delete:
      tags: [account]
      summary: Remove a favorite (immediate, no confirmation; Screen 15)
      operationId: removeFavorite
      security: [{ customerSessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          removed: { type: boolean, const: true }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ===== STORE INFO ============================================================
  /store-info:
    get:
      tags: [store-info]
      summary: Hours, location, contact (F-023; Screen 16)
      operationId: getStoreInfo
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/StoreInfo' }
        '500':
          $ref: '#/components/responses/ServerError'

  # ===== ADMIN DASHBOARD ========================================================
  /admin/dashboard/counts/products:
    get:
      tags: [admin-dashboard]
      summary: Product count tile (F-030; Screen 18). Split per-tile so one failing tile doesn't block others.
      operationId: getProductCount
      security: [{ staffSessionCookie: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CountData' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
