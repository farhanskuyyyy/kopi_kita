  # ===== ADMIN CATALOG — Products (Catalog Admin) ==============================
  /admin/products:
    get:
      tags: [admin-catalog]
      summary: Admin product list — search/filter, show-deleted toggle (F-031; Screen 19)
      operationId: adminListProducts
      security: [{ staffSessionCookie: [] }]
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Name match
        - name: category
          in: query
          schema: { type: string }
        - name: availability
          in: query
          schema: { type: string, enum: [in_stock, out_of_stock, all], default: all }
        - name: includeDeleted
          in: query
          schema: { type: boolean, default: false }
          description: Default off (§3.13) — "show deleted" toggle
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessBase'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/Product' }
                          pagination: { $ref: '#/components/schemas/PaginationMeta' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [admin-catalog]
      summary: Create product (F-032; Screen 20)
