worker_processes  auto;
pid                /tmp/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;

  # Non-root runtime needs a writable temp path set (see Dockerfile chown steps).
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — mirror vercel.json so behavior matches across both
    # deploy targets (Vercel primary, Docker/nginx portable alternative).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; frame-ancestors 'none'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # MSW service worker must be served as a real file, never rewritten to
    # index.html, and must carry Service-Worker-Allowed so its scope covers
    # the whole origin (/) even though the file lives at the root already.
    location = /mockServiceWorker.js {
      add_header Service-Worker-Allowed "/" always;
      add_header Cache-Control "no-cache" always;
      try_files $uri =404;
    }

    # Hashed build assets (JS/CSS/etc from Vite) are safe to cache forever.
    location /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      try_files $uri =404;
    }

    # index.html must always be revalidated so clients pick up new asset
    # hashes after each deploy.
    location = /index.html {
      add_header Cache-Control "no-cache" always;
      try_files $uri =404;
    }

    # SPA fallback for client-side routes (react-router). Real files above
    # are matched by their own location blocks first; anything else that
    # doesn't exist on disk falls back to index.html.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
